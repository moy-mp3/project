<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculateur social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Calculateur de chances</h1>

    <!-- CONTEXTE -->
    <label>Contexte :</label>
    <select id="contexte">
      <option value="20">Parc</option>
      <option value="0">Rue</option>
      <option value="-15">Transport</option>
      <option value="30">Soirée</option>
    </select>

    <!-- ATTITUDE -->
    <label>Attitude :</label>
    <select id="attitude">
      <option value="30">Calme</option>
      <option value="0">Neutre</option>
      <option value="-15">Stressé</option>
      <option value="-60">Insistant</option>
    </select>

    <!-- TIMING -->
    <label>Timing :</label>
    <select id="timing">
      <option value="25">Détendu</option>
      <option value="-40">Occupé</option>
    </select>

    <!-- BOUTON -->
    <button onclick="calculer()">Calculer</button>

    <!-- RESULTAT -->
    <div id="resultat">Résultat : -- %</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
