<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculateur Social</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Calculateur Social</h1>

  <!-- CONTEXTE -->
<div class="container1">
<h3 style="text-align: center;">Lieu</h3>
  <div class="ligne">
    <div>
      <select id="contexte">
      <option value="0"></option>
        <option value="20">Parc</option>
        <option value="0">Rue</option>
        <option value="-15">Transport</option>
        <option value="30">Soirée</option>
        <option value="-20">Nuit</option>
        <option value="25">File d’attente</option>
        <option value="5">Couloir</option>
        <option value="-10">Cantine</option>
        <option value="-5">Restaurant</option>
        <option value="15">Centre Commercial</option>
        <option value="10">Concert</option>
        <option value="25">Festival</option>
        <option value="15">Plage</option>
      </select>
    </div>
  </div>
</div>

  <!-- GENRE -->
<div class="container1">
<h3 style="text-align: center;">Genre</h3>
  <div class="ligne">
    <div>
      <label for="genre1">Abordeur</label>
      <select id="genre1">
        <option value="0"></option>
        <option value="1">Homme</option>
        <option value="10">Femme</option>
        <option value="0">Autre</option>
      </select>
    </div>

    <div>
      <label for="genre2">Interlocuteur</label>
      <select id="genre2">
        <option value="0"></option>
        <option value="1">Homme</option>
        <option value="10">Femme</option>
        <option value="2">Autre</option>
      </select>
    </div>
  </div>
</div>

  <!-- TAILLE -->
<div class="container1">
<h3 style="text-align: center;">Taille</h3>
  <div class="ligne">
    <div>
      <label for="taille1">Abordeur</label>
      <select id="taille1">
        <option value="0"></option>
        <option value="1">-150cm</option>
        <option value="2">150-160cm</option>
        <option value="3">160-170cm</option>
        <option value="4">170-180cm</option>
        <option value="5">180-190cm</option>
        <option value="6">190-200cm</option>
        <option value="7">+200cm</option>
      </select>
    </div>
  </div>
</div>

  <!-- LOOK -->
<div class="container1">
<h3 style="text-align: center;">Style vestimentaire</h3>
  <div class="ligne">
    <div>
      <label for="look1">Abordeur</label>
      <select id="look1">
        <option value="0"></option>
        <option value="-250">Nu</option>
        <option value="20">Propre</option>
        <option value="25">Stylé</option>
        <option value="-30">Négligé</option>
        <option value="0">Bariolé</option>
        <option value="15">Simple</option>
        <option value="15">Costume</option>
        <option value="5">Costard Cravate</option>
        <option value="30">Costard Cravate</option>
      </select>
    </div>

    <div>
      <label for="look2">Interlocuteur</label>
      <select id="look2">
        <option value="0"></option>
        <option value="-250">Nu</option>
        <option value="20">Propre</option>
        <option value="25">Stylé</option>
        <option value="-30">Négligé</option>
        <option value="0">Bariolé</option>
        <option value="15">Simple</option>
        <option value="15">Costume</option>
        <option value="5">Costard Cravate</option>
        <option value="30">Costard Cravate</option>
      </select>
    </div>
  </div>
</div>

 <!-- ATTITUDE -->
<div class="container1">
<h3 style="text-align: center;">Attitude</h3>
  <div class="ligne">
    <div>
      <label for="attitude1">Abordeur</label>
      <select id="attitude1">
        <option value="0"></option>
        <option value="30">Calme</option>
        <option value="0">Neutre</option>
        <option value="-15">Stressé</option>
        <option value="-60">Insistant</option>
        <option value="25">Chaleureux</option>
        <option value="-25">Excentrique</option>
        <option value="-30">Bruyant</option>
        <option value="-45">Dépressif</option>
      </select>
    </div>

    <div>
      <label for="attitude2">Interlocuteur</label>
      <select id="attitude2">
        <option value="0"></option>
        <option value="1">Calme</option>
        <option value="0">Neutre</option>
        <option value="-1">Stressé</option>
        <option value="-1">Insistant</option>
        <option value="1">Chaleureux</option>
        <option value="1">Excentrique</option>
        <option value="-1">Bruyant</option>
        <option value="1">Dépressif</option>
      </select>
    </div>
  </div>
</div>

  <!-- LANGAGE CORPOREL -->
<div class="container1">
<h3 style="text-align: center;">Langage corporel</h3>
  <div class="ligne">
    <div>
      <label for="corps1">Abordeur</label>
      <select id="corps1">
        <option value="0"></option>
        <option value="20">Regard naturel</option>
        <option value="-10">Regard fuyant</option>
        <option value="-30">Regard intense</option>
      </select>
    </div>
    <div>
      <select id="corps11">
        <option value="0"></option>
        <option value="15">Posture ouverte</option>
        <option value="-15">Posture fermée</option>
      </select>
    </div>
    <div>
      <label for="corps2">Interlocuteur</label>
      <select id="corps2">
        <option value="0"></option>
        <option value="20">Regard naturel</option>
        <option value="-10">Regard fuyant</option>
        <option value="-30">Regard intense</option>
      </select>
    </div>
    <div>
      <select id="corps22">
        <option value="0"></option>
        <option value="15">Posture ouverte</option>
        <option value="-15">Posture fermée</option>
      </select>
    </div>
  </div>
</div>

  <!-- APPROCHE -->
<div class="container1">
<h3 style="text-align: center;">Type d'approche</h3>
  <div class="ligne">
    <div>
      <label for="approche">Abordeur</label>
      <select id="approche">
        <option value="0"></option>
        <option value="30">Simple</option>
        <option value="20">Originale</option>
        <option value="-10">Maladroite</option>
        <option value="-50">Lourde</option>
        <option value="15">Humour</option>
        <option value="-25">Peur</option>
        <option value="-35">Flex</option>
        <option value="5">Intelligent</option>
        <option value="-10">Gaming</option>
      </select>
    </div>
  </div>
</div>

  <!-- TIMING -->
<div class="container1">
<h3 style="text-align: center;">Timing</h3>
  <div class="ligne">
    <div>
      <label for="timing">Interlocuteur</label>
      <select id="timing">
        <option value="0"></option>
        <option value="25">Détendu</option>
        <option value="-40">Occupé</option>
      </select>
    </div>
  </div>
</div>

  <!-- DISTANCE -->
<div class="container1">
<h3 style="text-align: center;">Distance</h3>
  <div class="ligne">
    <div>
      <select id="distance">
        <option value="0"></option>
        <option value="-15">-1m</option>
        <option value="15">1m</option>
        <option value="10">2m</option>
        <option value="-5">3m</option>
        <option value="-20">5m</option>
        <option value="-50">10m</option>
        <option value="-60">+10m</option>
      </select>
    </div>
  </div>
</div>

  <!-- VOIX -->
<div class="container1">
<h3 style="text-align: center;">Voix</h3>
  <div class="ligne">
    <div>
      <label for="voix1">Abordeur</label>
      <select id="voix1">
        <option value="0"></option>
        <option value="20">Calme</option>
        <option value="-10">Stressée</option>
        <option value="-30">Agressive</option>
        <option value="-20">Chanson</option>
        <option value="-30">Cassée</option>
        <option value="-30">Zozote</option>
        <option value="-30">Bégaye</option>
      </select>
    </div>

    <div>
      <label for="voix2">Interlocuteur</label>
      <select id="voix2">
        <option value="0"></option>
        <option value="5">Calme</option>
        <option value="-10">Stressée</option>
        <option value="-50">Agressive</option>
        <option value="0">Chanson</option>
        <option value="0">Cassée</option>
        <option value="0">Zozote</option>
        <option value="0">Bégaye</option>
      </select>
    </div>
  </div>
</div>

  <!-- PROFIL -->
<div class="container1">
<h3 style="text-align: center;">Profil</h3>
  <div class="ligne">
    <div>
      <label for="profil2">Interlocuteur</label>
      <select id="profil2">
        <option value="0"></option>
        <option value="30">Sociable</option>
        <option value="-20">Timide</option>
        <option value="-40">Fermé</option>
      </select>
    </div>
  </div>
</div>

  <!-- SIMILITUDE -->
<div class="container1">
<h3 style="text-align: center;">Similitude</h3>
  <div class="ligne">
    <div>
      <select id="similarite">
        <option value="0"></option>
        <option value="20">Similaire</option>
        <option value="-15">Différent</option>
      </select>
    </div>
  </div>
</div>

  <!-- CONTEXTE SOCIAL -->
<div class="container1">
<h3 style="text-align: center;">Contexte social</h3>
  <div class="ligne">
    <div>
      <label for="social1">Abordeur</label>
      <select id="social1">
        <option value="0"></option>
        <option value="20">Seule</option>
        <option value="5">En groupe</option>
      </select>
    </div>

    <div>
      <label for="social2">Interlocuteur</label>
      <select id="social2">
        <option value="0"></option>
        <option value="20">Seule</option>
        <option value="-10">En groupe</option>
      </select>
    </div>
  </div>
</div>

  <!-- DURÉE -->
<div class="container1">
<h3 style="text-align: center;">Durée</h3>
  <div class="ligne">
    <div>
      <select id="duree">
        <option value="0"></option>
        <option value="1">-1min</option>
        <option value="1">1min</option>
        <option value="1">2min</option>
        <option value="-1">5min</option>
        <option value="-1">10min</option>
        <option value="-1">15min</option>
        <option value=-1>+15min</option>
      </select>
    </div>
  </div>
</div>

  <!-- RESPECT -->
<div class="container1">
<h3 style="text-align: center;">Respect</h3>
  <div class="ligne">
    <div>
      <label for="respect1">Abordeur</label>
      <select id="respect1">
        <option value="0"></option>
        <option value="10">Respectueux</option>
        <option value="-40">Insistance</option>
      </select>
    </div>

    <div>
      <label for="respect2">Interlocuteur</label>
      <select id="respect2">
        <option value="0"></option>
        <option value="10">Respectueux</option>
        <option value="-40">Insistance</option>
      </select>
    </div>
  </div>
</div>


  <button onclick="calculer()">Calculer</button>

  <div class="bar-container">
    <div id="bar"></div>
  </div>

  <div id="resultat">-- %</div>
  <div id="conseil"></div>

</div>

<script src="script.js"></script>

    <br>
    <center>
        <span><a href="#" class="container">Revenir en haut</a></span>
    </center>
    <br>
</body>
</html>
